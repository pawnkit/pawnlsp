name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - if: runner.os == 'Linux'
        name: Check formatting and module files
        run: |
          test -z "$(gofmt -l .)"
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - if: runner.os == 'Linux'
        run: CGO_ENABLED=1 go test -race -shuffle=on ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  corpus:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pawnlsp
        uses: actions/checkout@v7
        with:
          path: pawnlsp
      - name: Check out pawn-corpus
        uses: actions/checkout@v7
        with:
          repository: pawnkit/pawn-corpus
          ref: ff6369e0060edb8667379abd35207d7d893ea12b
          path: pawn-corpus
      - uses: actions/setup-go@v6
        with:
          go-version-file: pawnlsp/go.mod
      - name: Run corpus-backed tests
        working-directory: pawnlsp
        env:
          PAWN_CORPUS_DIR: ${{ github.workspace }}/pawn-corpus
        run: go test -count=1 ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go tool govulncheck ./...
