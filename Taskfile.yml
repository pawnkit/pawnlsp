version: "3"

tasks:
  build:
    cmds:
      - go build ./...

  test:
    cmds:
      - go test ./...

  corpus:
    cmds:
      - PAWN_CORPUS_DIR="$(cd "${PAWN_CORPUS_DIR:-../pawn-corpus}" && pwd)" go test -count=1 ./...

  lint:
    cmds:
      - golangci-lint run ./...

  security:
    cmds:
      - go tool govulncheck ./...

  check:
    cmds:
      - test -z "$(gofmt -l .)"
      - go build ./...
      - go vet ./...
      - golangci-lint run ./...
      - CGO_ENABLED=1 go test -race -shuffle=on ./...
      - go tool govulncheck ./...
